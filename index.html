<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venezia Invisibile - Curiosità e Scorci</title>
    <meta name="description" content="Scopri i segreti e le curiosità meno note di Venezia. Storie di guardie, pietre consumate e angoli nascosti.">
    <style>
        /* BASE STYLE */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            line-height: 1.6; 
            max-width: 900px; 
            margin: auto; 
            padding: 40px 20px; 
            color: #2c3e50; 
            background-color: #f9f9f9;
            position: relative;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .logo { font-weight: bold; letter-spacing: 3px; text-transform: uppercase; font-size: 1.2em; color: #2c3e50; }

        nav ul { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #666; font-size: 0.85em; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: #C0392B; }

        /* HERO SECTION */
        header { text-align: center; margin-bottom: 100px; }
        header h1 { font-size: 3em; font-weight: 300; margin-bottom: 10px; color: #2c3e50; }
        header p { font-style: italic; color: #7f8c8d; font-size: 1.1em; }

        /* GRID DELLE CURIOSITÀ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: #C0392B; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .card h2 { font-size: 1.4em; margin-top: 0; transition: 0.3s; }
        .card:hover h2 { color: #C0392B; }
        
        .card p { font-size: 0.95em; color: #666; margin-bottom: 25px; }
        
        .btn-link { 
            text-decoration: none; 
            color: #C0392B; 
            font-weight: bold; 
            font-size: 0.85em; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: inline-block;
        }

        /* LA GUARDIA VENEZIANA - BACKGROUND FIXED */
        .guardia-home {
            position: fixed;
            bottom: -30px;
            right: -100px;
            width: 350px;
            opacity: 0.2; /* Leggermente più visibile */
            z-index: -1;
            transform: rotate(15deg);
            pointer-events: none;
            filter: grayscale(100%);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.2em; }
            nav { flex-direction: column; gap: 20px; text-align: center; }
            .guardia-home { width: 200px; right: -50px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Venezia Invisibile</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Segreti</a></li>
            <li><a href="#">Scorci</a></li>
        </ul>
    </nav>

    <header>
        <h1>Oltre la superficie</h1>
        <p>Storie rimosse, pietre consumate e angoli dimenticati della Serenissima.</p>
    </header>

    <main class="grid">
