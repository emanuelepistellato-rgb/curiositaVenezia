<!DOCTYPE html> 
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Scratching - Venezia Segreta</title>
    <style>
        /* STILE BASE */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            line-height: 1.6; 
            max-width: 900px; 
            margin: auto; 
            padding: 40px 20px; 
            color: #2c3e50; 
            background-color: #f9f9f9;
            position: relative;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR (RIPRISTINATA) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .logo { font-weight: bold; letter-spacing: 3px; text-transform: uppercase; font-size: 1.1em; color: #2c3e50; text-decoration: none; }

        nav ul { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #666; font-size: 0.85em; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: #C0392B; }

        /* CONTENUTO */
        h1 { color: #2c3e50; font-size: 2.5em; font-weight: 300; margin-bottom: 30px; }
        p { margin-bottom: 20px; }
        img { width: 100%; border-radius: 4px; margin-bottom: 30px; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .highlight { 
            background: #fcf8e3; 
            padding: 20px; 
            border-left: 5px solid #faf2cc; 
            margin: 30px 0;
            font-style: italic;
        }

        /* LA GUARDIA */
        .guardia-veneziana {
            position: absolute; 
            bottom: 150px;
            right: -20px;       
            width: 250px; 
            opacity: 0.4; 
            z-index: -1;
